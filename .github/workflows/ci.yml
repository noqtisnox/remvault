name: RemVault CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ── KTOR CORE MONOLITH ──────────────────────────────────────────
  test-server:
    name: Build & Test Ktor
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and Run Tests
        run: ./gradlew build

  # ── PYTHON AI MICROSERVICE ──────────────────────────────────────
  test-ai:
    name: Build & Test AI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install Dependencies
        working-directory: ./remvault-ai
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # TODO: Add a test script here when Pytest unit tests are added
      # - name: Run Pytest
      #   working-directory: ./remvault-ai
      #   run: pytest

  # ── REACT/VITE FRONTEND ─────────────────────────────────────────
  test-web:
    name: Build Web UI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "./web/package-lock.json"

      - name: Install Dependencies
        working-directory: ./web
        run: npm ci

      - name: Verify Build
        working-directory: ./web
        run: npm run build
